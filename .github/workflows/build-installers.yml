name: Build Installers

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  smoke:
    name: Smoke Test (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: Linux
          - os: windows-latest
            label: Windows

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run smoke checks
        run: npm run smoke

  build:
    name: Build ${{ matrix.label }}
    needs: smoke
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows
            package_command: npx electron-builder --win nsis --x64 --publish never
            artifact_glob: |
              release/*.exe
              release/*.blockmap
              release/latest.yml
          - os: ubuntu-latest
            label: Linux
            package_command: npx electron-builder --linux AppImage --x64 --publish never
            artifact_glob: |
              release/*.AppImage
              release/latest-linux.yml

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build renderer
        run: npm run build

      - name: Package installer
        run: ${{ matrix.package_command }}

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: comms-hub-${{ matrix.label }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: comms-hub-*
          path: release-assets
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/*.exe
            release-assets/*.blockmap
            release-assets/*.yml
            release-assets/*.AppImage
          generate_release_notes: true
