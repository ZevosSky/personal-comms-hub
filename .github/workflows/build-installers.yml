name: Build Installers

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows
            package_command: npx electron-builder --win nsis --x64 --publish never
            artifact_glob: |
              release/*.exe
              release/*.blockmap
              release/latest.yml
          - os: ubuntu-latest
            label: Linux
            package_command: npx electron-builder --linux AppImage --x64 --publish never
            artifact_glob: |
              release/*.AppImage
              release/latest-linux.yml

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build renderer
        run: npm run build

      - name: Package installer
        run: ${{ matrix.package_command }}

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: comms-hub-${{ matrix.label }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error
